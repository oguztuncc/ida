mission_manager_node:
  ros__parameters:
    auto_start: false
    disable_waypoint_completion: true
    complete_on_parkur3: true
    allow_runtime_mission_load: true
    allow_mission_reload_while_started: false
    require_runtime_mission_load: true
    min_runtime_waypoints: 1
    max_runtime_waypoints: 100

gps_guidance_node:
  ros__parameters:
    arrival_radius_m: 1.0

geofence_monitor_node:
  ros__parameters:
    enabled: true
    generated_half_width_m: 7.0
    outside_grace_s: 1.0
    outside_penalty_s: 40.0
    return_speed_mps: 0.12
    publish_rate_hz: 2.0

controller_node:
  ros__parameters:
    kp_heading: 0.02
    max_linear_speed: 0.30
    max_angular_speed: 0.6
    use_planner_bearing: true
    planner_timeout_s: 0.5
    geofence_timeout_s: 1.0

safety_node:
  ros__parameters:
    input_topic: /control/cmd_vel
    output_topic: /control/cmd_vel_safe
    latch_kill: true
    block_reset_on_physical_kill: true

mavros_bridge_node:
  ros__parameters:
    enabled: true
    output_mode: manual_control
    input_topic: /control/cmd_vel_safe
    cmd_vel_output_topic: /mavros/setpoint_velocity/cmd_vel_unstamped
    manual_control_topic: /mavros/manual_control/send
    command_timeout_s: 0.5
    publish_rate_hz: 20.0
    max_linear_speed_mps: 0.30
    max_yaw_rate_radps: 0.6
    manual_throttle_neutral: 500

rc_kill_node:
  ros__parameters:
    enabled: true
    channel_number: 7
    threshold_pwm: 1800
    active_high: true
    failsafe_on_missing: true
    rc_timeout_s: 0.5

power_relay_node:
  ros__parameters:
    enabled: false
    gpio_pin: -1
    active_low: false
    initial_motor_power_enabled: false

remote_kill_node:
  ros__parameters:
    enabled: false
    port: /dev/ttyUSB0
    baud_rate: 115200
    read_timeout_s: 0.02
    heartbeat_timeout_s: 1.0
    failsafe_on_timeout: true
    active_tokens:
      - KILL_ACTIVE
      - KILL
      - ACTIVE
      - "1"
    clear_tokens:
      - KILL_CLEAR
      - CLEAR
      - SAFE
      - "0"
    heartbeat_tokens:
      - HEARTBEAT
      - HB
      - OK

power_monitor_node:
  ros__parameters:
    enabled: false
    port: /dev/ttyUSB1
    baud_rate: 115200
    read_timeout_s: 0.02
    stale_timeout_s: 2.0

yki_bridge_node:
  ros__parameters:
    mavlink_connection_url: udpout:127.0.0.1:14550
    mavlink_baud_rate: 57600
    mavlink_source_system: 42
    mavlink_source_component: 191
    mavlink_send_statustext: true
    enable_command_rx: true
    enable_mission_rx: true
    max_mavlink_mission_items: 100

logger_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs

local_costmap_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs
    resolution_m: 0.25
    width_m: 12.0
    height_m: 12.0
    publish_rate_hz: 1.0

buoy_detector_node:
  ros__parameters:
    enable_yolo: true
    model_path: models/buoy_yolo.pt
    confidence_threshold: 0.45
    color_image_topic: /camera/camera/color/image_raw
    depth_image_topic: /camera/camera/aligned_depth_to_color/image_raw
    camera_info_topic: /camera/camera/color/camera_info
    assumed_horizontal_fov_deg: 87.0
    publish_empty_detections: true
    enable_video_recording: true
    record_dir: /tmp/ida_otonom_logs
    record_fps: 10.0

lidar_processor_node:
  ros__parameters:
    collision_distance_m: 0.8
    sector_width_deg: 30.0

# ==================== PARKUR 3 SPECIFIC ====================

color_receiver_node:
  ros__parameters:
    default_color: ""
    valid_colors:
      - red
      - blue
      - yellow
    color_timeout_s: 30.0
    auto_start_search: true

color_buoy_finder_node:
  ros__parameters:
    target_color: ""
    scan_range_max_m: 15.0
    scan_range_min_m: 0.15
    min_object_size_m: 0.3
    max_object_size_m: 1.0
    object_cluster_threshold_m: 0.5
    detection_confidence_threshold: 0.6
    sensor_timeout_s: 2.0

parkur3_planner_node:
  ros__parameters:
    max_speed_mps: 0.30
    approach_speed_mps: 0.15
    touch_speed_mps: 0.08
    search_turn_speed_radps: 0.4
    max_relative_bearing_deg: 45.0
    touch_distance_m: 0.5
    approach_distance_m: 3.0
    search_timeout_s: 60.0
    approach_timeout_s: 30.0
    touch_timeout_s: 10.0
    sensor_timeout_s: 2.0
    bearing_rate_limit_degps: 60.0
    require_color_first: true
    sim_contact_stop_enabled: false
    contact_clearance_m: 0.05
