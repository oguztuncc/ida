parkur2_sim_node:
  ros__parameters:
    world_variant: parkur3
    initial_lat: 40.1181000
    initial_lon: 26.4081000
    initial_heading_deg: 0.0
    update_rate_hz: 20.0
    scan_rate_hz: 10.0
    detection_rate_hz: 8.0
    world_rate_hz: 2.0
    time_scale: 2.0
    max_speed_mps: 0.50
    max_yaw_rate_radps: 0.90
    cmd_vel_topic: /control/cmd_vel_safe
    scan_range_max_m: 25.0
    scan_range_min_m: 0.15
    scan_ray_count: 361
    detection_range_max_m: 25.0
    detection_fov_deg: 120.0
    course_width_m: 8.82
    course_jitter_m: 0.0
    include_obstacles: false

mission_manager_node:
  ros__parameters:
    auto_start: true
    disable_waypoint_completion: true
    complete_on_parkur3: true

gps_guidance_node:
  ros__parameters:
    arrival_radius_m: 2.0

controller_node:
  ros__parameters:
    kp_heading: 0.024
    max_linear_speed: 0.30
    max_angular_speed: 0.6
    use_planner_bearing: true
    planner_timeout_s: 0.8

safety_node:
  ros__parameters:
    input_topic: /control/cmd_vel
    output_topic: /control/cmd_vel_safe
    latch_kill: true

logger_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs

local_costmap_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs
    resolution_m: 0.20
    width_m: 20.0
    height_m: 20.0
    publish_rate_hz: 2.0

lidar_processor_node:
  ros__parameters:
    collision_distance_m: 0.60
    sector_width_deg: 35.0
    max_avoidance_angle_deg: 60.0
    min_avoidance_angle_deg: 35.0
    candidate_step_deg: 5.0
    candidate_sector_width_deg: 16.0
    avoidance_release_distance_m: 4.0
    latch_avoidance_direction: true

# ==================== PARKUR 3 SPECIFIC ====================

color_receiver_node:
  ros__parameters:
    default_color: ""
    valid_colors:
      - red
      - blue
      - yellow
    color_timeout_s: 30.0
    auto_start_search: true

color_buoy_finder_node:
  ros__parameters:
    target_color: ""
    scan_range_max_m: 15.0
    scan_range_min_m: 0.15
    min_object_size_m: 0.3
    max_object_size_m: 1.0
    object_cluster_threshold_m: 0.5
    detection_confidence_threshold: 0.6
    sensor_timeout_s: 2.0

parkur3_planner_node:
  ros__parameters:
    max_speed_mps: 0.30
    approach_speed_mps: 0.15
    touch_speed_mps: 0.08
    search_turn_speed_radps: 0.4
    max_relative_bearing_deg: 45.0
    touch_distance_m: 0.5
    approach_distance_m: 3.0
    search_timeout_s: 60.0
    approach_timeout_s: 30.0
    touch_timeout_s: 10.0
    sensor_timeout_s: 2.0
    bearing_rate_limit_degps: 60.0
    require_color_first: true
    sim_contact_stop_enabled: true
    contact_clearance_m: 0.05

sim_visualizer_node:
  ros__parameters:
    window_width: 1100
    window_height: 760
    refresh_hz: 20.0
    trail_length: 3500
    initial_zoom: 1.0
    min_zoom: 0.5
    max_zoom: 8.0
    window_title: IDA Parkur-3 Renkli Duba Simulasyonu
