parkur2_sim_node:
  ros__parameters:
    initial_lat: 40.1181000
    initial_lon: 26.4081000
    initial_heading_deg: 45.0
    update_rate_hz: 20.0
    scan_rate_hz: 10.0
    detection_rate_hz: 8.0
    world_rate_hz: 2.0
    max_speed_mps: 0.40
    max_yaw_rate_radps: 0.85
    cmd_vel_topic: /control/cmd_vel_safe
    scan_range_max_m: 12.0
    scan_range_min_m: 0.15
    scan_ray_count: 361
    detection_range_max_m: 14.0
    detection_fov_deg: 180.0
    detection_topic: /perception/buoy_detections_raw
    course_width_m: 8.82

mission_manager_node:
  ros__parameters:
    auto_start: true

gps_guidance_node:
  ros__parameters:
    arrival_radius_m: 2.0

controller_node:
  ros__parameters:
    kp_heading: 0.017
    max_linear_speed: 0.34
    max_angular_speed: 0.42
    use_planner_bearing: true
    planner_timeout_s: 0.8

safety_node:
  ros__parameters:
    input_topic: /control/cmd_vel
    output_topic: /control/cmd_vel_safe
    latch_kill: true

logger_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs

local_costmap_node:
  ros__parameters:
    log_dir: /tmp/ida_otonom_logs
    resolution_m: 0.20
    width_m: 16.0
    height_m: 16.0
    publish_rate_hz: 2.0

lidar_processor_node:
  ros__parameters:
    collision_distance_m: 0.90
    sector_width_deg: 40.0
    max_avoidance_angle_deg: 65.0
    min_avoidance_angle_deg: 40.0
    candidate_step_deg: 5.0
    candidate_sector_width_deg: 18.0
    avoidance_release_distance_m: 5.0
    latch_avoidance_direction: true

course_memory_node:
  ros__parameters:
    learn_until_waypoint_index: 1
    min_samples: 4
    min_detection_confidence: 0.45
    course_class_names:
      - course_buoy
      - buoy
      - orange_buoy
    max_hue_std_deg: 35.0
    publish_rate_hz: 3.0

semantic_buoy_classifier_node:
  ros__parameters:
    require_sensor_validation: true
    course_class_names:
      - course_buoy
      - buoy
      - orange_buoy
    obstacle_class_names:
      - obstacle_buoy
      - obstacle
      - yellow_buoy
    target_class_names:
      - target_buoy
    course_hue_tolerance_deg: 35.0
    strong_color_diff_deg: 55.0
    min_confidence: 0.35

sensor_cross_validator_node:
  ros__parameters:
    input_topic: /perception/buoy_detections_raw
    output_topic: /perception/buoy_detections
    bearing_window_deg: 6.0
    range_tolerance_m: 0.85
    relative_range_tolerance: 0.30
    allow_lidar_only: true

corridor_tracker_node:
  ros__parameters:
    lookahead_m: 3.0
    expected_corridor_width_m: 8.82
    vehicle_width_m: 1.10
    side_safety_margin_m: 0.35
    min_gate_width_m: 2.20
    max_boundary_bearing_deg: 75.0
    min_boundary_range_m: 0.4
    max_boundary_range_m: 10.0
    center_smoothing_alpha: 0.25
    max_center_step_m: 0.6
    obstacle_avoidance_enabled: false
    obstacle_avoidance_range_m: 8.0
    obstacle_avoidance_margin_m: 0.80
    obstacle_max_offset_m: 1.50

parkur2_planner_node:
  ros__parameters:
    max_speed_mps: 0.30
    approach_speed_mps: 0.15
    danger_distance_m: 0.70
    avoid_start_distance_m: 3.20
    emergency_stop_distance_m: 0.45
    safe_clearance_m: 1.50
    max_relative_bearing_deg: 35.0
    max_pass_bearing_deg: 25.0
    max_return_bearing_deg: 18.0
    corridor_min_confidence: 0.45
    corridor_keepout_margin_m: 1.20
    obstacle_pass_margin_m: 1.20
    pass_lookahead_m: 6.0
    return_lookahead_m: 6.0
    pass_min_duration_s: 1.5
    pass_release_after_lost_s: 1.0
    corridor_coast_s: 1.2
    bearing_rate_limit_degps: 70.0
    sensor_timeout_s: 1.0
    final_approach_distance_m: 14.0
    waypoint_bias_weight: 0.20

sim_visualizer_node:
  ros__parameters:
    window_width: 1100
    window_height: 760
    refresh_hz: 20.0
    trail_length: 3500
    window_title: IDA Parkur-2 LiDAR Simulation
